services:
  mysql:
    image: mysql:8.0
    container_name: contract-agent-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root123}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-contract_agent}
      TZ: Asia/Shanghai
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/src/main/resources/db/migration:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-root123}"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: contract-agent-backend
    environment:
      SPRING_PROFILES_ACTIVE: docker
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DATABASE: ${MYSQL_DATABASE:-contract_agent}
      MYSQL_USER: root
      MYSQL_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root123}
      LLM_BASE_URL: https://api.deepseek.com
      LLM_API_KEY: ${DEEPSEEK_API_KEY:-sk-replace-me}
      LLM_MODEL: deepseek-chat
      JWT_SECRET: ${JWT_SECRET:-dev-secret-key-must-be-at-least-32-bytes-long-yes}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:-dify-internal-key-change-me}
      FRONTEND_URL: ${FRONTEND_URL:-http://38.22.95.144:5173}
      TZ: Asia/Shanghai
    volumes:
      - backend_storage:/app/storage
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: contract-agent-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped

  frontend-admin:
    build:
      context: .
      dockerfile: frontend-admin/Dockerfile
    container_name: contract-agent-frontend-admin
    ports:
      - "5174:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  mysql_data:
  backend_storage:
