services:
  mysql:
    image: mysql:8.0
    container_name: contract-agent-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?MYSQL_ROOT_PASSWORD must be set in .env}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-contract_agent}
      TZ: Asia/Shanghai
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:?MYSQL_ROOT_PASSWORD must be set in .env}"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: contract-agent-backend
    environment:
      SPRING_PROFILES_ACTIVE: docker
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DATABASE: ${MYSQL_DATABASE:-contract_agent}
      MYSQL_USER: root
      MYSQL_PASSWORD: ${MYSQL_ROOT_PASSWORD:?MYSQL_ROOT_PASSWORD must be set in .env}
      LLM_BASE_URL: https://api.deepseek.com
      LLM_API_KEY: ${DEEPSEEK_API_KEY:?DEEPSEEK_API_KEY must be set in .env}
      LLM_MODEL: deepseek-chat
      JAVA_TOOL_OPTIONS: >-
        -Dhttp.proxyHost=host.docker.internal
        -Dhttp.proxyPort=${HOST_HTTP_PROXY_PORT:-7890}
        -Dhttps.proxyHost=host.docker.internal
        -Dhttps.proxyPort=${HOST_HTTP_PROXY_PORT:-7890}
        -Dhttp.nonProxyHosts=localhost|127.*|[::1]|mysql|backend|frontend|frontend-admin|host.docker.internal
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set in .env}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:?INTERNAL_API_KEY must be set in .env}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5173}
      DIFY_TASK_OWNER_USERNAME: ${DIFY_TASK_OWNER_USERNAME:-admin}
      TZ: Asia/Shanghai
    volumes:
      - backend_storage:/app/storage
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: contract-agent-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped

  frontend-admin:
    build:
      context: .
      dockerfile: frontend-admin/Dockerfile
    container_name: contract-agent-frontend-admin
    ports:
      - "5174:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  mysql_data:
  backend_storage:
