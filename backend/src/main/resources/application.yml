server:
  port: 8080

spring:
  application:
    name: contract-agent
  profiles:
    active: local
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 50MB
  datasource:
    url: jdbc:mysql://localhost:3306/contract_agent?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=UTF-8&allowPublicKeyRetrieval=true
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 5

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: AUTO

storage:
  base-path: ./storage/contracts
  max-file-size-bytes: 20971520

springdoc:
  swagger-ui:
    path: /swagger-ui.html

internal:
  dify-task-owner-username: ${DIFY_TASK_OWNER_USERNAME:admin}
