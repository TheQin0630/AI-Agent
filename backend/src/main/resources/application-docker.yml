# Docker 环境配置：通过环境变量注入，不硬编码任何密钥
jwt:
  secret: ${JWT_SECRET}
  ttl-seconds: 86400

spring:
  main:
    allow-circular-references: true
  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 5
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:mysql}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:contract_agent}?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=UTF-8&allowPublicKeyRetrieval=true
    username: ${MYSQL_USER:root}
    password: ${MYSQL_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  ai:
    openai:
      # DeepSeek 兼容 OpenAI API 格式
      base-url: ${LLM_BASE_URL:https://api.deepseek.com}
      api-key: ${LLM_API_KEY}
      chat:
        options:
          model: ${LLM_MODEL:deepseek-chat}

storage:
  base-path: /app/storage/contracts
  max-file-size-bytes: 20971520

internal:
  api-key: ${INTERNAL_API_KEY}
  frontend-url: ${FRONTEND_URL:http://localhost:5173}
  dify-task-owner-username: ${DIFY_TASK_OWNER_USERNAME:admin}
