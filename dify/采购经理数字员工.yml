    - data:
        instruction: '你是一位企业采购业务流程中的意图分析助手，{{#1783334960607.user_input#}}是截至刚才用户与你的聊天记录。你需要做到：

          1、由于输入可能包含之前的对话，你需要从输入中分割出距离当前时间节点最近的、完整的那个输入语句，记作raw_input；

          2、判断raw_input是否为业务需求。若是，令has_intent为1，否则为0，bool型变量。

          3、若raw_input是业务需求，根据与用户的聊天记录{{#1783334960607.user_input#}}与系统业务规则补充必要的前置步骤，生成一个字符串列表，名为user_intent。列表内元素依次为完成业务需求所需要进行的子需求。


          当前采购业务流程规则如下：

          1.当用户希望创建、生成、办理、提交或制作采购申请单时，意图为采购申请单创建，子意图包含采销合同对比与采购申请单创建

          2.当用户希望检查、核对、比较、校验采购合同和销售合同时，意图为采销合同对比，子意图为采销合同对比

          3.当用户表示补充、修改、更正或完善之前缺失或异常的采购申请信息或用户输出内容为补充采购申请单字段时，意图为补充采购申请单信息，子意图为补充采购申请单信息

          4.当用户希望创建、生成、下采购订单时，意图为采购订单创建，子意图为采销合同对比、采购申请单创建、采购订单创建。'
        model:
          completion_params:
            temperature: 0.7
            thinking: true
          mode: chat
          name: deepseek-v4-pro
          provider: langgenius/deepseek/deepseek
        parameters:
        - description: 是否存在业务需求
          name: has_intent
          required: true
          type: boolean
        - description: 用户可能存在的业务需求
          name: user_intent
          required: false
          type: array[string]
        - description: 用户最近的一条原始完整输入
          name: raw_input
          required: true
          type: string
        query:
        - '1783334960607'
        - user_input
        reasoning_mode: prompt
        selected: false
        title: pre意图提取
        type: parameter-extractor
        vision:
          enabled: false
