    - data:
        code: "import json\nimport re\n\n\ndef main(text: str) -> dict:\n    if not\
          \ text or not text.strip():\n        return {\n            \"is_passed\"\
          : \"false\",\n            \"compare_status\": \"EMPTY_OUTPUT\",\n      \
          \      \"risk_level\": \"high\",\n            \"summary\": \"采销合同比对节点输出为空。\"\
          ,\n            \"user_compare_text\": \"采销合同比对节点输出为空，无法生成比对说明。\",\n    \
          \        \"blocking_issues_json\": json.dumps([\n                {\n   \
          \                 \"field\": \"llm_output\",\n                    \"field_name\"\
          : \"LLM输出\",\n                    \"reason\": \"采销合同比对节点输出为空。\",\n     \
          \               \"suggestion\": \"请检查 LLM 节点是否正常运行。\"\n                }\n\
          \            ], ensure_ascii=False),\n            \"warning_issues_json\"\
          : \"[]\",\n            \"comparison_json\": \"\"\n        }\n\n    raw =\
          \ text.strip()\n    raw = raw.replace(\"```json\", \"\").replace(\"```\"\
          , \"\").strip()\n\n    try:\n        outer = json.loads(raw)\n        if\
          \ isinstance(outer, dict) and \"text\" in outer:\n            raw = outer[\"\
          text\"]\n    except Exception:\n        pass\n\n    match = re.search(r\"\
          \\{[\\s\\S]*\\}\", raw)\n    if match:\n        raw = match.group(0)\n\n\
          \    try:\n        data = json.loads(raw)\n    except Exception as e:\n\
          \        return {\n            \"is_passed\": \"false\",\n            \"\
          compare_status\": \"JSON_PARSE_ERROR\",\n            \"risk_level\": \"\
          high\",\n            \"summary\": f\"采销合同比对结果不是合法 JSON：{str(e)}\",\n   \
          \         \"user_compare_text\": \"采销合同比对结果格式异常，无法生成逐项比对说明。\",\n       \
          \     \"blocking_issues_json\": json.dumps([\n                {\n      \
          \              \"field\": \"llm_output\",\n                    \"field_name\"\
          : \"LLM输出\",\n                    \"reason\": \"采销合同比对结果不是合法 JSON。\",\n\
          \                    \"suggestion\": \"请检查 LLM 提示词，确保只输出 JSON。\"\n     \
          \           }\n            ], ensure_ascii=False),\n            \"warning_issues_json\"\
          : \"[]\",\n            \"comparison_json\": \"\"\n        }\n\n    blocking_issues\
          \ = data.get(\"blocking_issues\") or []\n    warning_issues = data.get(\"\
          warning_issues\") or []\n\n    is_passed = data.get(\"is_passed\", False)\n\
          \n    # 只要存在阻断异常，就强制不通过\n    if blocking_issues:\n        is_passed = False\n\
          \n    compare_status = data.get(\"compare_status\")\n    if not compare_status:\n\
          \        compare_status = \"PASS\" if is_passed else \"FAIL\"\n\n    risk_level\
          \ = data.get(\"risk_level\")\n    if not risk_level:\n        risk_level\
          \ = \"low\" if is_passed else \"high\"\n\n    summary = data.get(\"summary\"\
          )\n    if not summary:\n        summary = \"采销合同比对通过。\" if is_passed else\
          \ \"采销合同比对不通过。\"\n\n    user_compare_text = data.get(\"user_compare_text\"\
          ) or \"未生成逐项比对说明。\"\n\n    data[\"is_passed\"] = is_passed\n    data[\"\
