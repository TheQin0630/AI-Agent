    - data:
        code: "import json\nfrom datetime import datetime\n\n\ndef main(purchase_application_json:\
          \ str) -> dict:\n    \"\"\"\n    模拟采购申请单创建节点\n\n    输入：\n    - purchase_application_json：上一步字段校验节点输出的采购申请单\
          \ JSON\n\n    输出：\n    - create_success：是否创建成功\n    - application_no：采购申请单编号\n\
          \    - application_status：申请单状态\n    - message：创建结果说明\n    - app_result_json：完整采购申请单创建结果\n\
          \    \"\"\"\n\n    if not purchase_application_json or not purchase_application_json.strip():\n\
          \        return {\n            \"create_success\": \"false\",\n        \
          \    \"application_no\": \"\",\n            \"application_status\": \"创建失败\"\
          ,\n            \"message\": \"采购申请单内容为空，无法创建采购申请单。\",\n            \"app_result_json\"\
          : \"\"\n        }\n\n    try:\n        app = json.loads(purchase_application_json)\n\
          \    except Exception as e:\n        return {\n            \"create_success\"\
          : \"false\",\n            \"application_no\": \"\",\n            \"application_status\"\
          : \"创建失败\",\n            \"message\": f\"采购申请单 JSON 解析失败：{str(e)}\",\n \
          \           \"app_result_json\": \"\"\n        }\n\n    now = datetime.now()\n\
          \n    # 生成模拟采购申请单编号\n    application_no = \"PA-\" + now.strftime(\"%Y%m%d%H%M%S\"\
          )\n\n    # 设置申请单状态\n    application_status = \"已提交审批\"\n\n    # 组装完整采购申请单创建结果\n\
          \    result = {\n        \"application_no\": application_no,\n        \"\
          application_status\": application_status,\n        \"application_title\"\
          : app.get(\"application_title\", \"\"),\n        \"application_type\": app.get(\"\
          application_type\", \"商品采购\"),\n        \"apply_date\": app.get(\"apply_date\"\
          , now.strftime(\"%Y-%m-%d\")),\n\n        \"supplier_name\": app.get(\"\
          supplier_name\", \"\"),\n\n        \"item_name\": app.get(\"item_name\"\
          , \"\"),\n        \"item_model\": app.get(\"item_model\", \"\"),\n     \
          \   \"unit\": app.get(\"unit\", \"\"),\n        \"quantity\": app.get(\"\
          quantity\", \"\"),\n\n        \"purchase_unit_price\": app.get(\"purchase_unit_price\"\
          , \"\"),\n        \"purchase_total_amount\": app.get(\"purchase_total_amount\"\
          , \"\"),\n        \"currency\": app.get(\"currency\", \"CNY\"),\n\n    \
          \    \"expected_delivery_date\": app.get(\"expected_delivery_date\", \"\"\
          ),\n        \"delivery_location\": app.get(\"delivery_location\", \"\"),\n\
          \        \"payment_terms\": app.get(\"payment_terms\", \"\"),\n\n      \
          \  \"create_time\": now.strftime(\"%Y-%m-%d %H:%M:%S\"),\n        \"message\"\
          : \"采购申请单已自动创建并提交审批。\"\n    }\n\n    return {\n        \"create_success\"\
          : \"true\",\n        \"application_no\": application_no,\n        \"application_status\"\
          : application_status,\n        \"message\": \"采购申请单已自动创建并提交审批。\",\n    \
          \    \"app_result_json\": json.dumps(result, ensure_ascii=False)\n    }"
        code_language: python3
        outputs:
          app_result_json:
            children: null
            type: string
          application_no:
            children: null
            type: string
          application_status:
            children: null
            type: string
          create_success:
            children: null
            type: string
          message:
            children: null
            type: string
        selected: false
        title: 正式创建采购申请单
        type: code
        variables:
