    - data:
        code: "import json\n\n\ndef main(data) -> dict:\n    # 1. 兼容不同输入结构\n    items\
          \ = []\n\n    if isinstance(data, list):\n        if len(data) > 0 and isinstance(data[0],\
          \ dict):\n            items = data[0].get(\"items\", [])\n        else:\n\
          \            items = data\n\n    elif isinstance(data, dict):\n        json_list\
          \ = data.get(\"data\") or data.get(\"json\") or []\n\n        if (\n   \
          \         isinstance(json_list, list)\n            and len(json_list) >\
          \ 0\n            and isinstance(json_list[0], dict)\n        ):\n      \
          \      items = json_list[0].get(\"items\", [])\n\n    # 没有读取到消息\n    if\
          \ not items:\n        return {\n            \"count_satisfied\": False,\n\
          \            \"user_input\": \"\",\n\n            \"file1_message_id\":\
          \ \"\",\n            \"file1_file_key\": \"\",\n            \"file1_file_name\"\
          : \"\",\n\n            \"file2_message_id\": \"\",\n            \"file2_file_key\"\
          : \"\",\n            \"file2_file_name\": \"\",\n\n            \"latest_file_name\"\
          : \"\"\n        }\n\n    file_messages = []\n    user_texts = []\n\n   \
          \ for msg in items:\n\n        msg_type = msg.get(\"msg_type\", \"\")\n\n\
          \        sender_info = msg.get(\"sender\", {})\n        sender_type = sender_info.get(\"\
          sender_type\", \"\")\n\n        # =========================\n        # 提取文件信息\n\
          \        # =========================\n        if msg_type == \"file\":\n\
          \n            body = msg.get(\"body\", {})\n            content_str = body.get(\"\
          content\", \"{}\")\n\n            try:\n                # 防止输入为 bytes\n\
          \                if isinstance(content_str, bytes):\n                  \
          \  content_str = content_str.decode(\"utf-8\")\n\n                # 如果已经是字典，不再执行\
          \ json.loads\n                if isinstance(content_str, dict):\n      \
          \              content_obj = content_str\n                else:\n      \
          \              content_obj = json.loads(content_str)\n\n               \
          \ file_key = str(\n                    content_obj.get(\"file_key\", \"\"\
          )\n                )\n\n                file_name = str(\n             \
          \       content_obj.get(\"file_name\", \"\")\n                )\n\n    \
          \        except Exception:\n\n                file_key = \"\"\n        \
          \        file_name = \"\"\n\n            file_messages.append({\n      \
          \          \"message_id\": str(\n                    msg.get(\"message_id\"\
          , \"\")\n                ),\n                \"file_key\": file_key,\n \
          \               \"file_name\": file_name,\n                \"create_time\"\
          : str(\n                    msg.get(\"create_time\", \"\")\n           \
          \     )\n            })\n\n        # =========================\n       \
          \ # 提取用户文本\n        # =========================\n        if (\n        \
          \    msg_type == \"text\"\n            and sender_type == \"user\"\n   \
          \     ):\n\n            body = msg.get(\"body\", {})\n            content_str\
          \ = body.get(\n                \"content\",\n                \"{}\"\n  \
          \          )\n\n            try:\n\n                if isinstance(content_str,\
          \ bytes):\n                    content_str = content_str.decode(\n     \
          \                   \"utf-8\"\n                    )\n\n               \
          \ if isinstance(content_str, dict):\n                    content_obj = content_str\n\
          \                else:\n                    content_obj = json.loads(\n\
          \                        content_str\n                    )\n\n        \
          \        text = str(\n                    content_obj.get(\"text\", \"\"\
          )\n                )\n\n                if text:\n                    user_texts.append(text)\n\
          \n            except Exception:\n                continue\n\n    # 按创建时间倒序排列\n\
          \    # 最新上传的文件位于第一位\n    file_messages.sort(\n        key=lambda x: x.get(\n\
          \            \"create_time\",\n            \"\"\n        ),\n        reverse=True\n\
          \    )\n\n    file_count = len(file_messages)\n\n    count_satisfied = (\n\
          \        file_count >= 2\n    )\n\n    # 获取指定位置的文件\n    def get_file(index):\n\
          \n        if index < file_count:\n            return file_messages[index]\n\
          \n        return {\n            \"message_id\": \"\",\n            \"file_key\"\
          : \"\",\n            \"file_name\": \"\",\n            \"create_time\":\
          \ \"\"\n        }\n\n    fm1 = get_file(0)\n    fm2 = get_file(1)\n\n  \
          \  # 合并用户文本\n    user_input = \"\\n\".join(\n        user_texts\n    )\n\
          \n    return {\n        \"count_satisfied\": count_satisfied,\n\n      \
          \  \"user_input\": user_input,\n\n        \"file1_message_id\": (\n    \
          \        fm1[\"message_id\"]\n        ),\n\n        \"file1_file_key\":\
          \ (\n            fm1[\"file_key\"]\n        ),\n\n        \"file1_file_name\"\
          : (\n            fm1[\"file_name\"]\n        ),\n\n        \"file2_message_id\"\
          : (\n            fm2[\"message_id\"]\n        ),\n\n        \"file2_file_key\"\
          : (\n            fm2[\"file_key\"]\n        ),\n\n        \"file2_file_name\"\
          : (\n            fm2[\"file_name\"]\n        ),\n        # 最新上传文件的名称\n \
          \       \"latest_file_name\": (\n            fm1[\"file_name\"]\n      \
          \  )\n    }"
        code_language: python3
        error_strategy: fail-branch
