    - data:
        code: "import json\n\n\ndef parse_contract_json(value):\n    \"\"\"\n    将变量聚合器输出的\
          \ JSON 字符串转换为 Python 字典。\n    同时兼容部分情况下输入已经是字典的情况。\n    \"\"\"\n\n    #\
          \ 已经是字典，直接返回\n    if isinstance(value, dict):\n        return value\n\n\
          \    # 输入为空\n    if value is None:\n        raise ValueError(\"合同聚合结果为空\"\
          )\n\n    # 必须是字符串或字典\n    if not isinstance(value, str):\n        raise\
          \ ValueError(\n            f\"合同聚合结果类型错误，当前类型为：{type(value).__name__}\"\n\
          \        )\n\n    value = value.strip()\n\n    if not value:\n        raise\
          \ ValueError(\"合同聚合结果为空字符串\")\n\n    # 兼容模板输出带有 Markdown JSON 代码块的情况\n \
          \   if value.startswith(\"```json\"):\n        value = value[7:]\n\n   \
          \ elif value.startswith(\"```\"):\n        value = value[3:]\n\n    if value.endswith(\"\
          ```\"):\n        value = value[:-3]\n\n    value = value.strip()\n\n   \
          \ # 第一次解析\n    result = json.loads(value)\n\n    # 某些情况下 JSON 字符串可能被再次包装成字符串\n\
          \    # 例如：\"{\\\"contract_type\\\":\\\"sales\\\"}\"\n    if isinstance(result,\
          \ str):\n        result = json.loads(result)\n\n    if not isinstance(result,\
          \ dict):\n        raise ValueError(\"合同模板输出不是有效的 JSON 对象\")\n\n    return\
          \ result\n\n\ndef main(\n    file1_contract_json: str,\n    file2_contract_json:\
          \ str\n) -> dict:\n\n    try:\n        # 解析 file1 和 file2 的合同数据\n      \
          \  file1_contract = parse_contract_json(\n            file1_contract_json\n\
          \        )\n\n        file2_contract = parse_contract_json(\n          \
          \  file2_contract_json\n        )\n\n        # 获取合同类型\n        file1_type\
          \ = str(\n            file1_contract.get(\"contract_type\", \"\")\n    \
          \    ).strip().lower()\n\n        file2_type = str(\n            file2_contract.get(\"\
          contract_type\", \"\")\n        ).strip().lower()\n\n        # 获取合同字段内容\n\
          \        file1_data = file1_contract.get(\"data\", {})\n        file2_data\
          \ = file2_contract.get(\"data\", {})\n\n        # 检查 data 是否为对象\n      \
          \  if not isinstance(file1_data, dict):\n            raise ValueError(\n\
          \                \"file1 合同中的 data 不是有效对象\"\n            )\n\n        if\
          \ not isinstance(file2_data, dict):\n            raise ValueError(\n   \
          \             \"file2 合同中的 data 不是有效对象\"\n            )\n\n        # 情况一：\n\
          \        # file1 是销售合同，file2 是采购合同\n        if (\n            file1_type\
          \ == \"sales\"\n            and file2_type == \"purchase\"\n        ):\n\
          \            sales_contract = file1_data\n            purchase_contract\
          \ = file2_data\n\n        # 情况二：\n        # file1 是采购合同，file2 是销售合同\n  \
          \      elif (\n            file1_type == \"purchase\"\n            and file2_type\
          \ == \"sales\"\n        ):\n            sales_contract = file2_data\n  \
          \          purchase_contract = file1_data\n\n        # 两份都是销售合同\n      \
          \  elif (\n            file1_type == \"sales\"\n            and file2_type\
          \ == \"sales\"\n        ):\n            return {\n                \"is_ready\"\
          : False,\n                \"check_status\": \"DUPLICATE_SALES\",\n     \
          \           \"message\": (\n                    \"检测到两份文件均为销售合同，\"\n   \
          \                 \"请上传一份销售合同和一份采购合同。\"\n                ),\n          \
          \      \"file1_type\": file1_type,\n                \"file2_type\": file2_type,\n\
          \                \"sales_contract_json\": \"{}\",\n                \"purchase_contract_json\"\
          : \"{}\"\n            }\n\n        # 两份都是采购合同\n        elif (\n        \
          \    file1_type == \"purchase\"\n            and file2_type == \"purchase\"\
          \n        ):\n            return {\n                \"is_ready\": False,\n\
          \                \"check_status\": \"DUPLICATE_PURCHASE\",\n           \
          \     \"message\": (\n                    \"检测到两份文件均为采购合同，\"\n         \
          \           \"请上传一份销售合同和一份采购合同。\"\n                ),\n                \"\
          file1_type\": file1_type,\n                \"file2_type\": file2_type,\n\
          \                \"sales_contract_json\": \"{}\",\n                \"purchase_contract_json\"\
          : \"{}\"\n            }\n\n        # 合同类型缺失或异常\n        else:\n        \
          \    return {\n                \"is_ready\": False,\n                \"\
          check_status\": \"INVALID_CONTRACT_TYPE\",\n                \"message\"\
          : (\n                    \"未能识别出一份销售合同和\"\n                    \"一份采购合同，请检查合同类型判断结果。\"\
          \n                ),\n                \"file1_type\": file1_type,\n    \
          \            \"file2_type\": file2_type,\n                \"sales_contract_json\"\
          : \"{}\",\n                \"purchase_contract_json\": \"{}\"\n        \
          \    }\n\n        # 成功输出归类后的销售合同和采购合同\n        return {\n            \"\
          is_ready\": True,\n            \"check_status\": \"READY\",\n          \
          \  \"message\": (\n                \"销售合同和采购合同字段已完成归类，\"\n             \
          \   \"可以进入采销合同比对。\"\n            ),\n            \"file1_type\": file1_type,\n\
          \            \"file2_type\": file2_type,\n            \"sales_contract_json\"\
          : json.dumps(\n                sales_contract,\n                ensure_ascii=False\n\
          \            ),\n            \"purchase_contract_json\": json.dumps(\n \
          \               purchase_contract,\n                ensure_ascii=False\n\
          \            )\n        }\n\n    except Exception as error:\n\n        return\
          \ {\n            \"is_ready\": False,\n            \"check_status\": \"\
          PARSE_ERROR\",\n            \"message\": (\n                f\"合同字段归类失败：{str(error)}\"\
          \n            ),\n            \"file1_type\": \"\",\n            \"file2_type\"\
          : \"\",\n            \"sales_contract_json\": \"{}\",\n            \"purchase_contract_json\"\
          : \"{}\"\n        }"
        code_language: python3
        outputs:
          check_status:
            children: null
            type: string
          file1_type:
            children: null
            type: string
          file2_type:
            children: null
            type: string
          is_ready:
            children: null
            type: boolean
          message:
            children: null
            type: string
          purchase_contract_json:
            children: null
            type: string
          sales_contract_json:
            children: null
            type: string
