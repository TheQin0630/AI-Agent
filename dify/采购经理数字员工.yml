    - data:
        code: "import json\r\nimport math\r\nimport re\r\nfrom datetime import datetime\r\
          \n\r\n\r\ndef main(purchase_application_json: str) -> dict:\r\n    \"\"\"\
          \r\n    正式创建采购申请单节点代码（字段更新修改初版）\r\n\r\n    上游输入：\r\n    - purchase_application_json：\r\
          \n      “采购申请单字段处理 LLM 节点后代码节点 V2”输出的\r\n      purchase_application_json。\r\
          \n\r\n    当前节点功能：\r\n    1. 解析并兼容采购申请单 JSON。\r\n    2. 统一少量历史字段名称，避免流程切换期间因旧字段名导致失败。\r\
          \n    3. 在创建前再次检查当前 16 个必填字段。\r\n    4. 生成采购申请单编号、标题、申请日期及创建结果。\r\n    5.\
          \ 删除旧字段 purchase_total_amount、currency、delivery_location、po。\r\n    6. 完整保留当前字段：\r\
          \n       applicant_name、supplier_name、currencyName、sendMode、\r\n       companyName、taxRateName、purchaseMoneyTax、moneyRmbNoTax、\r\
          \n       expected_delivery_date、exchangeRate、item_name、item_model、\r\n \
          \      quantity、unit、purchase_unit_price、payment_terms。\r\n\r\n    说明：\r\
          \n    - 本版本延续旧代码的“本地模拟创建”逻辑，不调用外部采购系统接口。\r\n    - 后续接入正式接口时，应以接口返回的申请单编号、状态和错误信息\r\
          \n      替换本节点中本地生成的 application_no 与 application_status。\r\n    \"\"\"\r\
          \n\r\n    canonical_fields = [\r\n        \"applicant_name\",\r\n      \
          \  \"supplier_name\",\r\n        \"currencyName\",\r\n        \"sendMode\"\
          ,\r\n        \"companyName\",\r\n        \"taxRateName\",\r\n        \"\
          purchaseMoneyTax\",\r\n        \"moneyRmbNoTax\",\r\n        \"expected_delivery_date\"\
          ,\r\n        \"exchangeRate\",\r\n        \"item_name\",\r\n        \"item_model\"\
          ,\r\n        \"quantity\",\r\n        \"unit\",\r\n        \"purchase_unit_price\"\
          ,\r\n        \"payment_terms\"\r\n    ]\r\n\r\n    field_labels = {\r\n\
          \        \"applicant_name\": \"申请人姓名\",\r\n        \"supplier_name\": \"\
          供应商名称\",\r\n        \"currencyName\": \"币种名称\",\r\n        \"sendMode\"\
          : \"发货方式\",\r\n        \"companyName\": \"法人主体名称\",\r\n        \"taxRateName\"\
