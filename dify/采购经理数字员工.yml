    - data:
        code: "from datetime import datetime, timedelta, timezone\n\ndef main(timestamp:\
          \ int) -> dict:\n    # 定义 UTC+8 时区（东八区）\n    tz_utc8 = timezone(timedelta(hours=8))\n\
          \n    # 将输入转换为整数（若传入字符串）\n    timestamp = int(timestamp)\n\n    # 1. 时间戳对应的格式化字符串\n\
          \    dt = datetime.fromtimestamp(timestamp , tz=tz_utc8)\n    current_str\
          \ = dt.strftime('%Y-%m-%d %H:%M:%S')\n\n    # 2. 前300秒的格式化字符串\n    dt_before\
          \ = datetime.fromtimestamp(timestamp - 300, tz=tz_utc8)\n    before_str\
          \ = dt_before.strftime('%Y-%m-%d %H:%M:%S')\n\n    # 输出两个变量\n    return\
          \ {\n        \"current_time\": current_str,\n        \"before_time\": before_str\n\
          \    }"
        code_language: python3
        desc: ''
        isInIteration: false
        isInLoop: false
        outputs:
          before_time:
            children: null
            type: string
          current_time:
            children: null
            type: string
        selected: false
        title: 时间戳转换为标准时间字符串 (4)
        type: code
        variables:
        - value_selector:
          - sys
          - timestamp
          value_type: number
