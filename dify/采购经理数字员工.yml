    - data:
        code: "import json\n\n\ndef main(http_response) -> dict:\n    \"\"\"\n   \
          \ 从飞书 GET_TOKEN HTTP 节点返回结果中提取 tenant_access_token。\n\n    兼容：\n    1. 直接传入\
          \ GET_TOKEN 节点的 body\n    2. 传入包含 body 的完整 HTTP 响应对象\n    \"\"\"\n\n   \
          \ try:\n        # 如果输入是字符串，先转为 Python 字典\n        if isinstance(http_response,\
          \ str):\n            data = json.loads(http_response)\n\n        elif isinstance(http_response,\
          \ dict):\n            data = http_response\n\n        else:\n          \
          \  return {\n                \"token\": \"\"\n            }\n\n        #\
          \ 情况一：\n        # 输入是完整 HTTP 响应：\n        # {\n        #   \"status_code\"\
          : 200,\n        #   \"body\": \"{\\\"tenant_access_token\\\":\\\"xxx\\\"\
          }\"\n        # }\n        if \"body\" in data:\n\n            body = data.get(\"\
          body\", {})\n\n            if isinstance(body, str):\n                body\
          \ = json.loads(body)\n\n        # 情况二：\n        # 输入已经是 GET_TOKEN 的 body：\n\
          \        # {\n        #   \"code\": 0,\n        #   \"tenant_access_token\"\
          : \"xxx\"\n        # }\n        else:\n            body = data\n\n     \
          \   # 提取 token\n        token = body.get(\n            \"tenant_access_token\"\
          ,\n            \"\"\n        )\n\n        # 去除可能存在的首尾空格\n        token =\
          \ str(token).strip()\n\n        return {\n            \"token\": token\n\
          \        }\n\n    except Exception:\n        return {\n            \"token\"\
          : \"\"\n        }"
        code_language: python3
