    - data:
        code: "\ndef main(app_result_json) -> dict:\n    import json\n\n    # 兼容字符串与字典输入\n\
          \    if isinstance(app_result_json, str):\n        try:\n            data\
          \ = json.loads(app_result_json)\n        except (json.JSONDecodeError, TypeError):\n\
          \            data = {}\n    elif isinstance(app_result_json, dict):\n  \
          \      data = app_result_json\n    else:\n        data = {}\n\n    # 构建采购订单，缺失字段采用默认值\n\
          \    order = {\n        \"application_no\": data.get(\"application_no\"\
          , \"\"),\n        \"supplier_name\": data.get(\"supplier_name\", \"\"),\n\
          \        \"currencyName\": data.get(\"currencyName\", \"\"),\n        \"\
          sendMode\": data.get(\"sendMode\", \"\"),\n        \"taxRateName\": data.get(\"\
          taxRateName\", \"\"),\n        \"expected_delivery_date\": data.get(\"expected_delivery_date\"\
          , \"\"),\n        \"item_name\": data.get(\"item_name\", \"\"),\n      \
          \  \"item_model\": data.get(\"item_model\", \"\"),\n        \"quantity\"\
          : data.get(\"quantity\", 0),\n        \"unit\": data.get(\"unit\", \"\"\
          ),\n        \"purchase_unit_price\": data.get(\"purchase_unit_price\", 0),\n\
          \        \"payment_terms\": data.get(\"payment_terms\", \"\"),\n       \
          \ \"create_time\": data.get(\"create_time\", \"\"),\n        \"purchaseMoneyTax\"\
          : data.get(\"purchaseMoneyTax\", 0),\n        \"exchangeRate\": data.get(\"\
          exchangeRate\", 0)\n    }\n\n    # 输出为单一对象，方便下游整体引用\n    return {\"purchase_order\"\
          : order}"
        code_language: python3
        outputs:
          purchase_order:
            children: null
            type: object
