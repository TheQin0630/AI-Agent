    - data:
        code: "def main(body_input) -> dict:\n    \"\"\"\n    从输入中提取 extraction_id,\
          \ confirm_url, application_status, application_no\n    兼容两种形式：\n    1. body_input\
          \ 直接是 body JSON 字符串\n    2. body_input 是包含 \"body\" 键的完整响应字典\n    \"\"\"\
          \n    import json\n\n    # 如果是字典且包含 \"body\" 键，则取出 body 字符串\n    if isinstance(body_input,\
          \ dict) and \"body\" in body_input:\n        body_str = body_input[\"body\"\
          ]\n    elif isinstance(body_input, str):\n        body_str = body_input\n\
          \    else:\n        return {\n            \"extraction_id\": \"\",\n   \
          \         \"confirm_url\": \"\",\n            \"application_status\": \"\
          \",\n            \"application_no\": \"\"\n        }\n\n    try:\n     \
          \   body_dict = json.loads(body_str)\n        data = body_dict.get(\"data\"\
          , {})\n        extraction_id = str(data.get(\"id\", \"\"))\n        confirm_url\
          \ = data.get(\"confirm_url\", \"\")\n        application_status = data.get(\"\
          application_status\", \"\")\n        application_no = data.get(\"application_no\"\
          , \"\")\n    except (json.JSONDecodeError, TypeError):\n        extraction_id\
          \ = \"\"\n        confirm_url = \"\"\n        application_status = \"\"\n\
          \        application_no = \"\"\n\n    return {\n        \"extraction_id\"\
          : extraction_id,\n        \"confirm_url\": confirm_url,\n        \"application_status\"\
          : application_status,\n        \"application_no\": application_no\n    }"
