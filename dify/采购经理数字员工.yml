          \ field, value in app.items():\n        if isinstance(value, str):\n   \
          \         app[field] = value.strip()\n\n    # ---------- 7. 注入飞书消息发送者用户\
          \ ID ----------\n    # 系统字段优先级高于 LLM。只要 applicant_id 有效，即使 LLM 输出\n    #\
          \ applicant_name=null 或将其放入 missing_fields，也会在后续重新校验时清除。\n    system_applicant_id,\
          \ applicant_id_issue = extract_applicant_id(\n        applicant_id\n   \
          \ )\n\n    if system_applicant_id:\n        app[\"applicant_name\"] = system_applicant_id\n\
          \n    # ---------- 8. 读取 LLM 输出的问题 ----------\n    llm_missing_fields =\
          \ data.get(\"missing_fields\") or []\n    llm_abnormal_fields = data.get(\"\
          abnormal_fields\") or []\n\n    if not isinstance(llm_missing_fields, list):\n\
          \        llm_missing_fields = []\n\n    if not isinstance(llm_abnormal_fields,\
          \ list):\n        llm_abnormal_fields = []\n\n    # ---------- 9. 税率标准化与校验\
          \ ----------\n    abnormal_fields = []\n\n    if applicant_id_issue:\n \
          \       abnormal_fields.append(applicant_id_issue)\n\n    tax_rate_decimal\
          \ = None\n\n    if not is_empty(app.get(\"taxRateName\")):\n        normalized_tax_name,\
          \ tax_rate_decimal = normalize_tax_rate(\n            app.get(\"taxRateName\"\
          )\n        )\n\n        if normalized_tax_name is None:\n            add_abnormal(\n\
          \                abnormal_fields,\n                \"taxRateName\",\n  \
          \              \"税率名称不是可识别的税率。\",\n                current_value=app.get(\"\
          taxRateName\"),\n                suggestion=\"请填写例如13%、6%或0%。\"\n      \
          \      )\n        \n\n    # ---------- 10. 数值字段标准化与基础校验 ----------\n   \
          \ numeric_fields = [\n        \"purchaseMoneyTax\",\n        \"moneyRmbNoTax\"\
          ,\n        \"exchangeRate\",\n        \"quantity\",\n        \"purchase_unit_price\"\
          \n    ]\n\n    numeric_values = {}\n\n    for field in numeric_fields:\n\
          \        raw_value = app.get(field)\n\n        if is_empty(raw_value):\n\
          \            numeric_values[field] = None\n            continue\n\n    \
          \    number = to_number(raw_value)\n        numeric_values[field] = number\n\
          \n        if number is None or number <= 0:\n            add_abnormal(\n\
          \                abnormal_fields,\n                field,\n            \
          \    f\"{field_labels[field]}必须是大于0的数字。\",\n                current_value=raw_value,\n\
          \                suggestion=f\"请检查{field_labels[field]}是否填写正确。\"\n     \
          \       )\n        else:\n            app[field] = compact_number(number)\n\
          \n    # ---------- 11. 人民币汇率自动补充 ----------\n    # 仅当汇率确实为空时自动补 1；若用户提供了非法汇率，不覆盖原值。\n\
          \    if is_rmb_currency(app.get(\"currencyName\")):\n        if is_empty(app.get(\"\
          exchangeRate\")):\n            app[\"exchangeRate\"] = 1\n            numeric_values[\"\
          exchangeRate\"] = 1.0\n        else:\n            exchange_rate_value =\
          \ numeric_values.get(\"exchangeRate\")\n            if (\n             \
          \   exchange_rate_value is not None\n                and exchange_rate_value\
          \ > 0\n                and not math.isclose(\n                    exchange_rate_value,\n\
          \                    1.0,\n                    rel_tol=1e-9,\n         \
          \           abs_tol=1e-9\n                )\n            ):\n          \
          \      add_abnormal(\n                    abnormal_fields,\n           \
          \         \"exchangeRate\",\n                    \"币种为人民币时，汇率应为1。\",\n \
          \                   current_value=app.get(\"exchangeRate\"),\n         \
          \           suggestion=\"请将人民币汇率修改为1。\"\n                )\n\n    # ----------\
          \ 12. 含税/不含税金额自动互算 ----------\n    purchase_money_tax = numeric_values.get(\"\
          purchaseMoneyTax\")\n    money_rmb_no_tax = numeric_values.get(\"moneyRmbNoTax\"\
          )\n    exchange_rate = numeric_values.get(\"exchangeRate\")\n\n    can_calculate_amount\
          \ = (\n        tax_rate_decimal is not None\n        and exchange_rate is\
          \ not None\n        and exchange_rate > 0\n    )\n\n    # 已知含税金额，自动计算人民币不含税金额\n\
          \    if (\n        is_empty(app.get(\"moneyRmbNoTax\"))\n        and purchase_money_tax\
          \ is not None\n        and purchase_money_tax > 0\n        and can_calculate_amount\n\
          \    ):\n        calculated_no_tax_rmb = (\n            purchase_money_tax\n\
          \            * exchange_rate\n            / (1 + tax_rate_decimal)\n   \
          \     )\n        calculated_no_tax_rmb = round_amount(calculated_no_tax_rmb)\n\
          \n        if calculated_no_tax_rmb is not None and calculated_no_tax_rmb\
          \ > 0:\n            app[\"moneyRmbNoTax\"] = calculated_no_tax_rmb\n   \
          \         numeric_values[\"moneyRmbNoTax\"] = float(calculated_no_tax_rmb)\n\
          \            money_rmb_no_tax = float(calculated_no_tax_rmb)\n\n    # 已知人民币不含税金额，自动反算原币含税金额\n\
          \    if (\n        is_empty(app.get(\"purchaseMoneyTax\"))\n        and\
          \ money_rmb_no_tax is not None\n        and money_rmb_no_tax > 0\n     \
          \   and can_calculate_amount\n    ):\n        calculated_purchase_tax =\
          \ (\n            money_rmb_no_tax\n            * (1 + tax_rate_decimal)\n\
          \            / exchange_rate\n        )\n        calculated_purchase_tax\
          \ = round_amount(calculated_purchase_tax)\n\n        if calculated_purchase_tax\
          \ is not None and calculated_purchase_tax > 0:\n            app[\"purchaseMoneyTax\"\
          ] = calculated_purchase_tax\n            numeric_values[\"purchaseMoneyTax\"\
          ] = float(\n                calculated_purchase_tax\n            )\n   \
          \         purchase_money_tax = float(calculated_purchase_tax)\n\n    # ----------\
          \ 13. 日期标准化与校验 ----------\n    if not is_empty(app.get(\"expected_delivery_date\"\
          )):\n        normalized_date = normalize_explicit_date(\n            app.get(\"\
          expected_delivery_date\")\n        )\n\n        if normalized_date is None:\n\
          \            add_abnormal(\n                abnormal_fields,\n         \
          \       \"expected_delivery_date\",\n                \"预计交货时间不是可识别的明确日期。\"\
          ,\n                current_value=app.get(\"expected_delivery_date\"),\n\
          \                suggestion=\"请补充明确日期，例如2026-07-20。\"\n            )\n \
          \       else:\n            app[\"expected_delivery_date\"] = normalized_date\n\
          \n    # ---------- 14. 清理并合并 LLM abnormal_fields ----------\n    for issue\
          \ in llm_abnormal_fields:\n        normalized = normalize_issue(issue, \"\
          abnormal\")\n\n        if not normalized:\n            continue\n\n    \
          \    field = normalized.get(\"field\")\n\n        # 自动补全后，LLM 仅因“缺失”产生的旧异常不再保留。\n\
          \        if (\n            field in canonical_fields\n            and not\
          \ is_empty(app.get(field))\n            and issue_is_missing_like(normalized)\n\
          \        ):\n            continue\n\n        abnormal_fields.append(normalized)\n\
          \n    # ---------- 15. 自动补全完成后重新生成 missing_fields ----------\n    cleaned_missing_fields\
          \ = []\n    existing_missing_names = set()\n\n    # 先保留 LLM 返回、且当前仍然为空的有效缺失字段\n\
          \    for issue in llm_missing_fields:\n        normalized = normalize_issue(issue,\
          \ \"missing\")\n\n        if not normalized:\n            continue\n\n \
          \       field = normalized.get(\"field\")\n\n        if field not in canonical_fields:\n\
          \            continue\n\n        # 自动补全或原本已有值时，不再认定为缺失\n        if not is_empty(app.get(field)):\n\
          \            continue\n\n        if field not in existing_missing_names:\n\
          \            cleaned_missing_fields.append(normalized)\n            existing_missing_names.add(field)\n\
          \n    # 再由代码检查所有当前必填字段\n    for field in canonical_fields:\n        if is_empty(app.get(field))\
          \ and field not in existing_missing_names:\n            cleaned_missing_fields.append({\n\
          \                \"field\": field,\n                \"field_name\": field_labels[field],\n\
          \                \"reason\": f\"{field_labels[field]}缺失，无法创建采购申请单。\",\n\
          \                \"suggestion\": f\"请补充{field_labels[field]}。\"\n      \
          \      })\n            existing_missing_names.add(field)\n\n    # ----------\
          \ 16. 含税金额与数量 × 单价一致性 ----------\n    quantity = numeric_values.get(\"quantity\"\
          )\n    unit_price = numeric_values.get(\"purchase_unit_price\")\n    purchase_money_tax\
          \ = numeric_values.get(\"purchaseMoneyTax\")\n\n    if (\n        quantity\
          \ is not None\n        and unit_price is not None\n        and purchase_money_tax\
          \ is not None\n        and quantity > 0\n        and unit_price > 0\n  \
          \      and purchase_money_tax > 0\n    ):\n        calculated_total = quantity\
          \ * unit_price\n        tolerance = max(\n            AMOUNT_ABS_TOLERANCE,\n\
          \            abs(calculated_total) * AMOUNT_REL_TOLERANCE\n        )\n\n\
          \        if abs(purchase_money_tax - calculated_total) > tolerance:\n  \
          \          add_abnormal(\n                abnormal_fields,\n           \
          \     \"purchaseMoneyTax\",\n                \"采购金额（含税）与采购数量 × 采购单价明显不一致。\"\
          ,\n                current_value=compact_number(purchase_money_tax),\n \
          \               suggestion=\"请检查采购数量、采购单价或采购金额（含税）。\",\n               \
          \ calculated_value=compact_number(calculated_total),\n                tolerance=compact_number(tolerance)\n\
          \            )\n\n    # ---------- 17. 含税金额、不含税金额、税率与汇率一致性 ----------\n\
          \    money_rmb_no_tax = numeric_values.get(\"moneyRmbNoTax\")\n    exchange_rate\
          \ = numeric_values.get(\"exchangeRate\")\n\n    if (\n        purchase_money_tax\
          \ is not None\n        and money_rmb_no_tax is not None\n        and exchange_rate\
          \ is not None\n        and tax_rate_decimal is not None\n        and purchase_money_tax\
          \ > 0\n        and money_rmb_no_tax > 0\n        and exchange_rate > 0\n\
          \    ):\n        calculated_no_tax_rmb = (\n            purchase_money_tax\n\
          \            * exchange_rate\n            / (1 + tax_rate_decimal)\n   \
          \     )\n\n        tolerance = max(\n            AMOUNT_ABS_TOLERANCE,\n\
          \            abs(calculated_no_tax_rmb) * AMOUNT_REL_TOLERANCE\n       \
          \ )\n\n        if abs(money_rmb_no_tax - calculated_no_tax_rmb) > tolerance:\n\
          \            add_abnormal(\n                abnormal_fields,\n         \
          \       \"moneyRmbNoTax\",\n                \"采购金额（RMB）不含税与含税金额、税率及汇率明显不一致。\"\
          ,\n                current_value=compact_number(money_rmb_no_tax),\n   \
          \             suggestion=\"请检查采购含税金额、不含税金额、税率或汇率。\",\n                calculated_value=compact_number(calculated_no_tax_rmb),\n\
          \                tolerance=compact_number(tolerance)\n            )\n\n\
          \    # ---------- 18. 问题去重 ----------\n    cleaned_missing_fields = deduplicate_issues(\n\
          \        cleaned_missing_fields\n    )\n    abnormal_fields = deduplicate_issues(\n\
          \        abnormal_fields\n    )\n\n    # ---------- 19. 重新计算最终状态 ----------\n\
          \    if cleaned_missing_fields:\n        is_ready = False\n        check_status\
          \ = \"MISSING_FIELD\"\n        message = \"采购申请单字段缺失，暂不能创建采购申请单。\"\n\n \
          \   elif abnormal_fields:\n        is_ready = False\n        check_status\
          \ = \"ABNORMAL_FIELD\"\n        message = \"采购申请单字段存在异常，暂不能创建采购申请单。\"\n\n\
          \    else:\n        is_ready = True\n        check_status = \"PASS\"\n \
          \       message = \"采购申请单字段完整且校验通过，可以创建采购申请单。\"\n\n    # ---------- 20.\
          \ 返回 Dify ----------\n    return {\n        \"is_ready\": True if is_ready\
          \ else False,\n        \"check_status\": check_status,\n        \"message\"\
          : message,\n        \"missing_fields_json\": json.dumps(\n            cleaned_missing_fields,\n\
          \            ensure_ascii=False\n        ),\n        \"abnormal_fields_json\"\
          : json.dumps(\n            abnormal_fields,\n            ensure_ascii=False\n\
          \        ),\n        \"purchase_application_json\": json.dumps(\n      \
          \      app,\n            ensure_ascii=False\n        )\n    }"
        code_language: python3
