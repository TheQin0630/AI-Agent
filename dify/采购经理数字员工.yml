    - data:
        code: "def main(input_data) -> dict:\n    \"\"\"\n    从 JSON 结构中提取 approval_result。\n\
          \    输入 input_data 可以是：\n    - 字典：{\"input_data\": [{\"result\": [{\"approval_result\"\
          : \"未审批\"}]}]}\n    - 字符串：'{\"input_data\": [{\"result\": [{\"approval_result\"\
          : \"未审批\"}]}]}'\n    \"\"\"\n    import json\n\n    # 解析输入\n    if isinstance(input_data,\
          \ str):\n        try:\n            data = json.loads(input_data)\n     \
          \   except (json.JSONDecodeError, TypeError):\n            return {\"approval_result\"\
          : \"\"}\n    elif isinstance(input_data, dict):\n        data = input_data\n\
          \    else:\n        return {\"approval_result\": \"\"}\n\n    # 安全提取 approval_result\n\
          \    try:\n        result = data[\"input_data\"][0][\"result\"][0][\"approval_result\"\
          ]\n    except (KeyError, IndexError, TypeError):\n        result = \"\"\n\
          \n    return {\"approval_result\": result}"
