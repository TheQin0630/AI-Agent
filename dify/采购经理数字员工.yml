    - data:
        code: "import json\n\ndef main(chat_data) -> dict:\n    # 1. 若传入的是字符串，先解析成\
          \ Python 对象\n    if isinstance(chat_data, str):\n        chat_data = json.loads(chat_data)\n\
          \n    # 2. 若是列表，取第一个元素（Dify 可能把单对象包装成列表）\n    if isinstance(chat_data, list):\n\
          \        if len(chat_data) == 0:\n            return {\"user_texts\": [],\
          \ \"user_files\": []}\n        chat_data = chat_data[0]\n\n    # 3. 兼容多种数据结构提取\
          \ items 列表\n    items = None\n    if isinstance(chat_data, dict):\n    \
          \    # 路径 1：完整结构 chat_data[\"json\"][0][\"items\"]\n        if \"json\"\
          \ in chat_data and isinstance(chat_data[\"json\"], list) and len(chat_data[\"\
          json\"]) > 0:\n            if \"items\" in chat_data[\"json\"][0]:\n   \
          \             items = chat_data[\"json\"][0][\"items\"]\n        # 路径 2：直接包含\
          \ items 键\n        elif \"items\" in chat_data:\n            items = chat_data[\"\
          items\"]\n        # 路径 3：其他可能情况（可扩展）\n    \n    # 4. 如果还是找不到 items，直接返回空\n\
          \    if items is None:\n        return {\"user_texts\": [], \"user_files\"\
          : []}\n\n    # 5. 提取用户文本和文件\n    user_texts = []\n    user_files = []\n\n\
          \    for item in items:\n        if item.get(\"sender\", {}).get(\"sender_type\"\
          ) != \"user\":\n            continue\n\n        msg_type = item.get(\"msg_type\"\
          )\n        content_str = item.get(\"body\", {}).get(\"content\", \"{}\"\
          )\n        try:\n            content = json.loads(content_str)\n       \
          \ except Exception:\n            continue\n\n        if msg_type == \"text\"\
          :\n            text = content.get(\"text\", \"\")\n            user_texts.append(text)\n\
          \        elif msg_type == \"file\":\n            file_info = {\n       \
          \         \"file_key\": content.get(\"file_key\"),\n                \"file_name\"\
          : content.get(\"file_name\")\n            }\n            user_files.append(file_info)\n\
          \n    return {\n        \"user_texts\": user_texts,\n        \"user_files\"\
          : user_files\n    }"
        code_language: python3
