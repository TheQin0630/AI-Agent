          ,\n        \"sendMode\": \"发货方式\",\n        \"companyName\": \"法人主体名称\"\
          ,\n        \"taxRateName\": \"税率名称\",\n        \"purchaseMoneyTax\": \"\
          采购金额（含税）\",\n        \"moneyRmbNoTax\": \"采购金额（RMB）不含税\",\n        \"expected_delivery_date\"\
          : \"预计交货时间\",\n        \"exchangeRate\": \"汇率\",\n        \"item_name\"\
