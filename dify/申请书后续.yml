            你的任务：\n1. 明确说明采购申请单暂未创建。\n2. 根据校验状态{{#1783339738594.compare_status#}}并结合系统提示{{#1783339738594.summary#}}判断异常类型：\n\
            \   - MISSING_FIELD：存在缺失字段\n   - ABNORMAL_FIELD：存在异常字段\n   - JSON_PARSE_ERROR：上游模型输出无法正常解析\n\
            \   - EMPTY_OUTPUT：上游未获取到有效采购信息。提示用户重新提交采购信息或重新上传采购合同\n   - FAIL：其他失败原因\n\
            3.根据，展示当前已经识别出的采购申请单信息。 只展示输入中真实存在的信息，不要编造，也不要把空值、未知、未提及等内容描述为有效字段。 按照以下固定顺序展示：\
            \ \n【当前已识别的采购申请单信息】 \n申请标题、申请日期、供应商名称、商品名称、规格型号、采购数量、单位、采购单价、采购总金额、预计交付日期、交付地点、付款条款。没有有效值的字段可以省略，输出时信息之间请换行输出。\n\
            3. 如果{{#1783339738594.compare_status#}}为 MISSING_FIELD，则用中文名称对应列出实际缺失字段，明确告诉用户需要补充哪些信息，并提示用户可以直接使用自然语言回复\n\
            4.如果{{#1783339738594.compare_status#}}为 ABNORMAL_FIELD，则展示对应异常字段并说明异常原因和建议修改内容，并提示用户回复需要更正后的值，异常字段说明放在缺失字段说明后\n\
            5. 给出用户下一步处理建议。\n6.回复必须完整保留当前已经识别出的采购申请单信息和需要补充或修改的字段\n7. 不要编造输入中不存在的信息。\n\
            8. 不要输出 JSON，直接输出自然语言消息，回复要简洁清晰，适合飞书消息通知。"
        selected: false
