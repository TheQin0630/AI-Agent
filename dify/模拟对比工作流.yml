    - data:
        code: "import json\nfrom datetime import datetime\n\ndef main(sales_json_str:\
          \ str, purchase_json_str: str) -> dict:\n    \n    # 【新增】：精准判空逻辑，直接指出是哪个文件出了问题\n\
          \    if not sales_json_str or not sales_json_str.strip():\n        return\
          \ {\n            \"result\": \"❌ 阻断错误：【销售合同】的解析结果为空！\\n原因排查：1. 文档提取器未提取到文字（可能是扫描版图片PDF）；2.\
          \ LLM节点未正确输出。\",\n            \"is_passed\": False\n        }\n        \n\
          \    if not purchase_json_str or not purchase_json_str.strip():\n      \
          \  return {\n            \"result\": \"❌ 阻断错误：【采购合同】的解析结果为空！\\n原因排查：1. 文档提取器未提取到文字（可能是扫描版图片PDF）；2.\
          \ LLM节点未正确输出。\",\n            \"is_passed\": False\n        }\n\n    # 辅助函数：清洗\
          \ LLM 可能带上的 markdown 标记\n    def clean_json(text):\n        return text.replace(\"\
          ```json\", \"\").replace(\"```\", \"\").strip()\n\n    try:\n        sales_data\
          \ = json.loads(clean_json(sales_json_str))\n        purchase_data = json.loads(clean_json(purchase_json_str))\n\
          \    except json.JSONDecodeError as e:\n        return {\n            \"\
          result\": f\"❌ 格式错误：大模型输出的内容不是合法的 JSON。\\n错误详情：{str(e)}\\n\\n销售合同原始输出：{sales_json_str[:100]}...\\\
          n采购合同原始输出：{purchase_json_str[:100]}...\",\n            \"is_passed\": False\
          \ \n        }\n    except Exception as e:\n        return {\n          \
          \  \"result\": f\"❌ 发生未知错误：{str(e)}\",\n            \"is_passed\": False\n\
          \        }\n\n    report = []\n    is_passed = True\n    \n    # 1. 产品与数量比对\n\
          \    sales_products = {p['name']: p for p in sales_data.get('products',\
          \ []) if p.get('name')}\n    purchase_products = {p['name']: p for p in\
          \ purchase_data.get('products', []) if p.get('name')}\n    \n    for name,\
          \ s_prod in sales_products.items():\n        if name not in purchase_products:\n\
          \            report.append(f\"❌ 异常：采购合同中缺少产品 '{name}'。\")\n            is_passed\
          \ = False\n            continue\n            \n        p_prod = purchase_products[name]\n\
          \        \n        # 数量比对\n        s_qty = s_prod.get('quantity')\n    \
          \    p_qty = p_prod.get('quantity')\n        if s_qty is not None and p_qty\
          \ is not None and s_qty != p_qty:\n            report.append(f\"❌ 异常：产品\
          \ '{name}' 数量不一致。销售: {s_qty}, 采购: {p_qty}。\")\n            is_passed = False\n\
          \            \n        # 利润空间比对 (假设规定毛利率不得低于 15%)\n        s_price = s_prod.get('unit_price')\n\
          \        p_price = p_prod.get('unit_price')\n        if s_price and p_price\
          \ and s_price > 0:\n            margin = (s_price - p_price) / s_price\n\
          \            if margin < 0.15:\n                report.append(f\"⚠️ 警告：产品\
          \ '{name}' 毛利率仅为 {margin:.2%}，低于 15% 安全阈值，请人工复核。\")\n                \n\
          \    # 2. 交付日期比对 (采购到货必须早于销售交付)\n    s_date_str = sales_data.get('delivery_date')\n\
          \    p_date_str = purchase_data.get('delivery_date')\n    if s_date_str\
          \ and p_date_str:\n        try:\n            s_date = datetime.strptime(str(s_date_str).split('T')[0],\
          \ '%Y-%m-%d')\n            p_date = datetime.strptime(str(p_date_str).split('T')[0],\
          \ '%Y-%m-%d')\n            if p_date > s_date:\n                report.append(f\"\
          ❌ 严重异常：采购预计到货 ({p_date_str}) 晚于销售交付 ({s_date_str})，存在违约风险！\")\n        \
          \        is_passed = False\n        except ValueError:\n            report.append(\"\
          ⚠️ 警告：日期格式解析失败，请人工核对交付日期。\")\n            \n    if not report:\n       \
          \ report.append(\"✅ 比对通过：采销合同关键条款一致，利润空间合理，交付日期满足要求。\")\n        \n    final_report\
          \ = \"\\n\".join(report)\n    \n    return {\n        \"result\": final_report,\n\
          \        \"is_passed\": is_passed\n    }\n"
        code_language: python3
        outputs:
          is_passed:
            children: null
            type: boolean
          result:
            children: null
            type: string
