          role: system
          text: "你是一个资深的法务和采购专家。请仔细阅读以下采购合同文本，提取关键结构化信息。\n请严格以纯 JSON 格式输出，不要包含任何 Markdown\
            \ 标记（如 ```json），不要包含任何解释性文字。如果某项信息未提及，请填 null。确保数字类型不带单位。\n\n输出格式要求：\n\
            {\n  \"customer_name\": \"客户名称\",\n  \"supplier_name\": \"供应商名称\"\n  \"\
            products\": [\n    {\n      \"name\": \"产品名称\",\n      \"quantity\": 数量(数字),\n\
            \      \"unit_price\": 单价(数字)\n    }\n  ],\n  \"total_amount\": 合同总金额(数字),\n\
            \  \"delivery_date\": \"交付日期(YYYY-MM-DD格式)\"\n}\n"
        - id: b4f0fa19-6b6b-498d-9675-7fa0787c6e98
          role: user
          text: '{{#1783067822894.text#}}'
        selected: false
        title: 解析采购合同
        type: llm
        vision:
          enabled: false
      height: 88
