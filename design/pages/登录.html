    <style type="text/tailwindcss">
  
  @layer base {
    body { background: var(--background); color: var(--foreground); }
    td, th { @apply break-words; word-break: break-all; word-break: auto-phrase; }
    th { @apply whitespace-nowrap; }
  }
    </style>
    <style>
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
      [data-icon] {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        -webkit-mask-size: contain;
        mask-size: contain;
        -webkit-mask-repeat: no-repeat;
        mask-repeat: no-repeat;
        -webkit-mask-position: center;
        mask-position: center;

<body class="min-h-screen font-sans antialiased">
    <main class="flex items-center justify-center min-h-screen px-4">
  <div class="w-full max-w-sm">

    <!-- Brand -->
    <div class="flex items-center gap-3 mb-8 justify-center">
      <div class="w-10 h-10 rounded-lg grid place-items-center font-bold text-sm" style="background:var(--sidebar-primary);color:var(--sidebar-primary-foreground);border-radius:calc(var(--radius) + 4px);">CC</div>
      <div>
        <h1 class="text-base font-semibold leading-tight" style="color:var(--foreground);">合同对比 Agent</h1>
        <p class="text-xs" style="color:var(--muted-foreground);">Contract Compare Platform</p>
      </div>
    </div>

    <!-- Card (border-based, zero elevation) -->
    <div class="rounded-lg" style="background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:calc(var(--spacing)*6);">

      <!-- Tabs -->
      <div class="flex gap-0 mb-6" style="border-bottom:1px solid var(--border);">
        <button id="tab-login" class="tab-btn pb-3 text-sm font-semibold cursor-pointer bg-transparent border-0" style="color:var(--primary);border-bottom:2px solid var(--primary);margin-bottom:-1px;" onclick="switchTab('login')">登录</button>
        <button id="tab-register" class="tab-btn pb-3 text-sm font-semibold cursor-pointer bg-transparent border-0" style="color:var(--muted-foreground);border-bottom:2px solid transparent;margin-bottom:-1px;margin-left:calc(var(--spacing)*4);" onclick="switchTab('register')">注册</button>
      </div>

      <!-- Login Form -->
      <form id="form-login" class="flex flex-col gap-4" onsubmit="return false;">
        <div class="flex flex-col gap-1.5">
          <label class="text-xs font-medium" style="color:var(--muted-foreground);">用户名</label>
          <div class="flex items-center gap-2 rounded-md" style="border:1px solid var(--input);background:var(--popover);padding:0 calc(var(--spacing)*3);height:32px;">
            <i data-lucide="user" style="width:16px;height:16px;color:var(--muted-foreground);flex-shrink:0;"></i>
            <input type="text" placeholder="请输入用户名" class="bg-transparent border-0 outline-none text-sm w-full" style="color:var(--foreground);font-family:var(--font-sans);">
          </div>
        </div>
        <div class="flex flex-col gap-1.5">
          <label class="text-xs font-medium" style="color:var(--muted-foreground);">密码</label>
          <div class="flex items-center gap-2 rounded-md" style="border:1px solid var(--input);background:var(--popover);padding:0 calc(var(--spacing)*3);height:32px;">
            <i data-lucide="lock" style="width:16px;height:16px;color:var(--muted-foreground);flex-shrink:0;"></i>
            <input type="password" placeholder="请输入密码" class="bg-transparent border-0 outline-none text-sm w-full" style="color:var(--foreground);font-family:var(--font-sans);">
          </div>
        </div>
        <button data-dom-id="btn-login" type="submit" class="mt-2 flex items-center justify-center gap-2 cursor-pointer font-medium text-sm" style="height:32px;padding:0 calc(var(--spacing)*4);background:var(--primary);color:var(--primary-foreground);border:1px solid transparent;border-radius:var(--radius);box-shadow:none;transition:filter .15s ease;" onmouseover="this.style.filter='brightness(0.96)'" onmouseout="this.style.filter='none'">登录</button>
      </form>

      <!-- Register Form (hidden by default) -->
      <form id="form-register" class="flex flex-col gap-4 hidden" onsubmit="return false;">
        <div class="flex flex-col gap-1.5">
          <label class="text-xs font-medium" style="color:var(--muted-foreground);">用户名</label>
          <div class="flex items-center gap-2 rounded-md" style="border:1px solid var(--input);background:var(--popover);padding:0 calc(var(--spacing)*3);height:32px;">
            <i data-lucide="user" style="width:16px;height:16px;color:var(--muted-foreground);flex-shrink:0;"></i>
            <input type="text" placeholder="请输入用户名" class="bg-transparent border-0 outline-none text-sm w-full" style="color:var(--foreground);font-family:var(--font-sans);">
          </div>
        </div>
        <div class="flex flex-col gap-1.5">
          <label class="text-xs font-medium" style="color:var(--muted-foreground);">密码</label>
          <div class="flex items-center gap-2 rounded-md" style="border:1px solid var(--input);background:var(--popover);padding:0 calc(var(--spacing)*3);height:32px;">
            <i data-lucide="lock" style="width:16px;height:16px;color:var(--muted-foreground);flex-shrink:0;"></i>
            <input type="password" placeholder="请输入密码" class="bg-transparent border-0 outline-none text-sm w-full" style="color:var(--foreground);font-family:var(--font-sans);">
          </div>
        </div>
        <div class="flex flex-col gap-1.5">
          <label class="text-xs font-medium" style="color:var(--muted-foreground);">确认密码</label>
          <div class="flex items-center gap-2 rounded-md" style="border:1px solid var(--input);background:var(--popover);padding:0 calc(var(--spacing)*3);height:32px;">
            <i data-lucide="lock" style="width:16px;height:16px;color:var(--muted-foreground);flex-shrink:0;"></i>
            <input type="password" placeholder="请再次输入密码" class="bg-transparent border-0 outline-none text-sm w-full" style="color:var(--foreground);font-family:var(--font-sans);">
          </div>
        </div>
        <button data-dom-id="btn-register" type="submit" class="mt-2 flex items-center justify-center gap-2 cursor-pointer font-medium text-sm" style="height:32px;padding:0 calc(var(--spacing)*4);background:var(--secondary);color:var(--secondary-foreground);border:1px solid var(--border);border-radius:var(--radius);box-shadow:none;transition:background .15s ease, border-color .15s ease;" onmouseover="this.style.background='var(--accent)';this.style.borderColor='var(--accent)';this.style.color='var(--accent-foreground)'" onmouseout="this.style.background='var(--secondary)';this.style.borderColor='var(--border)';this.style.color='var(--secondary-foreground)'">注册</button>
      </form>

    </div>

  </div>
</main>
    <script>
    function switchTab(tab) {
      var loginForm = document.getElementById('form-login');
      var registerForm = document.getElementById('form-register');
      var tabLogin = document.getElementById('tab-login');
      var tabRegister = document.getElementById('tab-register');
      if (tab === 'login') {
        loginForm.classList.remove('hidden');
        registerForm.classList.add('hidden');
        tabLogin.style.color = 'var(--primary)';
        tabLogin.style.borderBottom = '2px solid var(--primary)';
        tabRegister.style.color = 'var(--muted-foreground)';
        tabRegister.style.borderBottom = '2px solid transparent';
      } else {
        loginForm.classList.add('hidden');
        registerForm.classList.remove('hidden');
        tabRegister.style.color = 'var(--primary)';
        tabRegister.style.borderBottom = '2px solid var(--primary)';
        tabLogin.style.color = 'var(--muted-foreground)';
        tabLogin.style.borderBottom = '2px solid transparent';
      }
    }
    lucide.createIcons();
    </script>
</body>
</html>
